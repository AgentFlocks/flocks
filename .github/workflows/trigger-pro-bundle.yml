name: Publish core artifact to Console

on:
  release:
    types: [published]

jobs:
  publish-core-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Publish OSS core artifact
        env:
          CONSOLE_API_BASE: ${{ secrets.FLOCKS_CONSOLE_API_BASE }}
          CONSOLE_OPS_TOKEN: ${{ secrets.FLOCKS_CONSOLE_OPS_TOKEN }}
          OSS_VERSION: ${{ github.event.release.tag_name }}
          RELEASE_NOTES: ${{ github.event.release.body }}
          RELEASE_ID: ${{ github.event.release.id }}
        run: |
          if [ -z "${CONSOLE_API_BASE}" ]; then
            echo "FLOCKS_CONSOLE_API_BASE is required" >&2
            exit 1
          fi
          ARCHIVE_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${OSS_VERSION}.tar.gz"
          TMP_ARCHIVE="$(mktemp)"
          curl -fSL "${ARCHIVE_URL}" -o "${TMP_ARCHIVE}"
          ARCHIVE_SHA256="$(shasum -a 256 "${TMP_ARCHIVE}" | awk '{print $1}')"
          jq -n \
            --arg oss_version "${OSS_VERSION}" \
            --arg archive_url "${ARCHIVE_URL}" \
            --arg archive_sha256 "${ARCHIVE_SHA256}" \
            --arg release_notes "${RELEASE_NOTES}" \
            --arg source_repo "${{ github.repository }}" \
            --arg github_release_id "${RELEASE_ID}" \
            --arg published_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{oss_version:$oss_version,archive_url:$archive_url,archive_sha256:$archive_sha256,release_notes:$release_notes,source_repo:$source_repo,github_release_id:$github_release_id,published_at:$published_at}' \
            > core-artifact.json
          curl -fSL -X POST "${CONSOLE_API_BASE%/}/v1/ops/artifacts/flocks-core" \
            -H "authorization: Bearer ${CONSOLE_OPS_TOKEN}" \
            -H "content-type: application/json" \
            --data-binary "@core-artifact.json"
