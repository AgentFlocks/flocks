name: hub_echo
description: Echo a message for validating bundled Hub tool installation.
category: custom
enabled: true
requires_confirmation: false
provider: hub_echo

inputSchema:
  type: object
  properties:
    message:
      type: string
      description: Message to echo.
  required:
    - message

handler:
  type: script
  script_file: hub_echo.handler.py
  function: echo
