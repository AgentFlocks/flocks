name: 360_waf_api_mutation
description: >
  360 WAF v5.5 官方 REST 变更调用工具。普通非 GET 调用需要 confirm=mutation；
  重启、升级、配置导入、部署模式、License、网络接口和安全域等 WAF 本体修改接口会直接拒绝。
category: custom
enabled: true
requires_confirmation: true
provider: 360_waf
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: REST 变更操作名称。
      enum:
        - waf_call_mutation
        - waf_call_api
        - test
    method:
      type: string
      enum: [GET, POST, PUT, DELETE]
      description: HTTP 方法。
    path:
      type: string
      description: 已收录的 /rest/api/... 路径。
    query:
      type: object
      description: 可选的 WAF 查询对象，会编码为 query= JSON。
    body:
      type: string
      description: POST、PUT 或 DELETE 调用使用的 JSON 请求体，传入对象或数组的 JSON 字符串。
    confirm:
      type: string
      enum: [mutation, dangerous]
      description: 非 GET 调用必填。普通变更传 mutation；仅保留的历史高风险动作可传 dangerous，WAF 本体修改仍会被拒绝。
  required:
    - action
handler:
  type: script
  script_file: 360_waf.handler.py
  function: api_mutation
