name: secgate3600_api_readonly
description: SecGate 3600 documented read-only REST caller.
description_cn: SecGate 3600 文档内只读 REST 调用工具。使用 api_catalog 查看已收录 API，再用 rest_call_readonly 调用任意 kind=readonly 的 module/function。
category: custom
enabled: true
requires_confirmation: false
provider: secgate3600_api
version: "3.6.6.0"
inputSchema:
  type: object
  properties:
    action:
      type: string
      enum:
        - api_catalog
        - rest_call_readonly
        - notice_num_day
        - threats_last_day
        - focus_last_day
        - cpu_usage
        - memory_usage
        - disk_usage
        - connection_monitor
        - system_info
        - system_resource
        - interface_info
        - interface_list
        - security_policy_list
        - test
    module:
      type: string
      description: rest_call_readonly 使用的模块名，例如 dashboard。必须属于 api_catalog 中 kind=readonly 的条目。
    function:
      type: string
      description: rest_call_readonly 使用的方法名，例如 get_system_resource。必须属于 api_catalog 中 kind=readonly 的条目。
    page_index:
      type: integer
    page_size:
      type: integer
    body:
      type: object
      description: REST 请求 body。
  required:
    - action
handler:
  type: script
  script_file: secgate3600.handler.py
  function: api_readonly
