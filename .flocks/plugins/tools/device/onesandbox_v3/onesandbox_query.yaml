name: onesandbox_query
description: >
  OneSandbox v3 read-only grouped tool for health checks, API version, file
  reports, task queue, report download, hash reputation, SDK policy,
  SafeSkill report, and CheckURL result/report queries.
description_cn: >
  OneSandbox v3 只读分组工具，支持健康检查、API 版本、文件报告、任务队列、
  报告下载、Hash 信誉、SDK 策略、SafeSkill 报告和 CheckURL 结果/报告查询。
category: custom
enabled: true
requires_confirmation: false
provider: onesandbox_api
inputSchema:
  type: object
  properties:
    action:
      type: string
      enum:
        - readyz
        - livez
        - api_version
        - file_report
        - file_queue
        - download_file_report
        - hash_reputation
        - sdk_policy_get
        - safeskill_report
        - checkurl_result
        - checkurl_report
        - checkurl_summary
      description: 查询动作名。
    sha256:
      type: string
      description: 文件 SHA256。
    md5:
      type: string
      description: 文件 MD5。
    sha1:
      type: string
      description: 文件 SHA1。
    query_fields:
      type: string
      description: file_report 查询字段，如 summary/multiengines/static/sandbox/email。
    sandbox_type:
      type: string
      description: download_file_report 沙箱环境。
    type:
      type: string
      description: download_file_report 下载类型：sample/static/report/pcap/drop/buffer/trace。
    output_filename:
      type: string
      description: 下载文件保存名。
    task_id:
      type: string
      description: CheckURL 任务 ID。
    uuid:
      type: string
      description: CheckURL 报告 UUID。
    summary:
      type: boolean
      description: 查询 CheckURL report 时是否只返回摘要。
  required:
    - action
handler:
  type: script
  script_file: onesandbox.handler.py
  function: query
