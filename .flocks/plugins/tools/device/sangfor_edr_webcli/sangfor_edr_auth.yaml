name: sangfor_edr_auth
description: >
  Manage Sangfor EDR browser authentication state. Use ensure_auth_state to
  validate the saved auth-state and automatically refresh full browser state
  through browser daemon / CDP when credentials are configured.
description_cn: >
  管理深信服 EDR 浏览器登录态。ensure_auth_state 会检查已保存 state；
  当 state 缺失或失效且已配置账密时，通过 browser daemon / CDP 驱动真实
  登录页自动登录并重新保存完整浏览器 state。
category: custom
enabled: true
requires_confirmation: false
provider: sangfor_edr
inputSchema:
  type: object
  properties:
    action:
      type: string
      enum: [ensure_auth_state, validate_auth_state, refresh_auth_state]
      default: ensure_auth_state
      description: >
        Authentication action. ensure_auth_state reuses existing state when it
        appears valid and refreshes when needed; validate_auth_state checks only;
        refresh_auth_state always performs CDP-assisted browser login.
    captcha_code:
      type: string
      description: Optional manual captcha code. When omitted, OCR is used if enabled.
    base_url:
      type: string
      description: Optional EDR base URL to save before running auth, for example https://edr.example.com.
    username:
      type: string
      description: Optional username to save before running auth.
    password:
      type: string
      description: Optional password to save as a secret before running auth.
    auth_state_path:
      type: string
      description: Optional auth-state path. Defaults to ~/.flocks/browser/sangfor-edr/auth-state.json.
    agreement_selector:
      type: string
      description: Optional selector for the EDR user agreement checkbox.
    persist_credentials:
      type: boolean
      default: true
      description: Persist provided base_url, username, password, and auth_state_path for future refreshes.
    force_refresh:
      type: boolean
      default: false
      description: Force CDP-assisted browser login even if auth-state exists.
  required: [action]
handler:
  type: script
  script_file: sangfor_edr.handler.py
  function: handle
